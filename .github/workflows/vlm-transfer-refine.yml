name: Transfer-oriented VLM targeted attack

on:
  push:
    paths:
      - '.github/workflows/vlm-transfer-refine.yml'
  pull_request:
    paths:
      - 'run-vlm-transfer-refine.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      HF_HOME: /tmp/hf-cache
      HF_HUB_DISABLE_XET: '1'
      TOKENIZERS_PARALLELISM: 'false'
    steps:
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.5.1 torchvision==0.20.1
          python -m pip install 'numpy<2' pillow transformers==4.48.3 accelerate safetensors sentencepiece
      - name: Stage verified image and script
        run: |
          python - <<'PY'
          import base64,hashlib,json,urllib.request
          repo='strawberryCao/llm_jupyter_env'
          def blob(sha):
              with urllib.request.urlopen(f'https://api.github.com/repos/{repo}/git/blobs/{sha}') as r:
                  p=json.load(r)
              return base64.b64decode(p['content'].replace('\n',''))
          open('/tmp/vlm_transfer_refine.py','wb').write(blob('4e96506201f701765fca31b36b342eb5ad355dd0'))
          image=b''.join(blob(s) for s in ['90e6a75422eb0fc6d823a296098830b5e4868eeb','5d35ad32b5b74a9440d115e6d21bcc8b553f7dcf','fce4f0b47ea88cb6d2d3de0153d79f084ef8fae5','4a65c32e409345e2adb155f8f1154644fe2498da'])
          if hashlib.sha256(image).hexdigest()!='837468e1264b669180d8b8537b004d45a531fe494eb87cbb1b7071ba9d2d770a':
              raise RuntimeError('image integrity mismatch')
          open('/tmp/vlm_input.jpg','wb').write(image)
          PY
      - name: Run transfer-oriented refinement
        shell: bash
        run: |
          set -o pipefail
          python /tmp/vlm_transfer_refine.py 2>&1 | tee /tmp/vlm_transfer_refine.log
      - name: Upload result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vlm-transfer-refine-result
          path: |
            /tmp/vlm_refined_best.png
            /tmp/vlm_refined_report.json
            /tmp/vlm_transfer_refine.log
            /tmp/vlm_input.jpg
            /tmp/vlm_refined_out
          if-no-files-found: warn
          retention-days: 7
