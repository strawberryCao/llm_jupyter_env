name: ImageNet black-box adversarial attack

on:
  push:
    paths:
      - '.github/workflows/adversarial-attack.yml'
  pull_request:
    paths:
      - 'run-blackbox-attack.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install preconfigured PyTorch environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.5.1 torchvision==0.20.1
          python -m pip install 'numpy<2' pillow

      - name: Stage black-box attack inputs
        run: |
          python - <<'PY'
          import base64, json, urllib.request
          repo = 'strawberryCao/llm_jupyter_env'
          def blob(sha):
              url = f'https://api.github.com/repos/{repo}/git/blobs/{sha}'
              with urllib.request.urlopen(url) as response:
                  payload = json.load(response)
              return base64.b64decode(payload['content'].replace('\n', ''))
          open('/tmp/blackbox_attack.py', 'wb').write(blob('408f891da27b927553394f005f2887162f3c3b62'))
          open('/tmp/input.jpg', 'wb').write(
              blob('612db87af62a133695969f9f664143904823c8f4') +
              blob('2b5b659283e72bdb0b550e084c6be0b365c5ca54')
          )
          print('Black-box script and input staged.')
          PY

      - name: Run score-query black-box attack
        run: |
          python /tmp/blackbox_attack.py | tee /tmp/blackbox.log

      - name: Upload verified black-box result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imagenet-blackbox-adversarial-result
          path: |
            /tmp/blackbox_adv.png
            /tmp/blackbox_result.json
            /tmp/blackbox.log
            /tmp/input.jpg
          if-no-files-found: warn
          retention-days: 7
