name: ImageNet adversarial attack

on:
  push:
    paths:
      - '.github/workflows/adversarial-attack.yml'
  pull_request:
    paths:
      - 'run-adversarial-attack.txt'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  attack:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install CPU PyTorch environment
        run: |
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu torch==2.5.1 torchvision==0.20.1
          python -m pip install pillow

      - name: Stage one-time attack inputs
        run: |
          python - <<'PY'
          import base64, json, urllib.request
          repo = 'strawberryCao/llm_jupyter_env'
          def blob(sha):
              url = f'https://api.github.com/repos/{repo}/git/blobs/{sha}'
              with urllib.request.urlopen(url) as response:
                  payload = json.load(response)
              return base64.b64decode(payload['content'].replace('\n', ''))
          open('/tmp/attack.py', 'wb').write(blob('7c71390ff44ada9134c2b0af77879fb985f7b2c9'))
          open('/tmp/input.jpg', 'wb').write(
              blob('612db87af62a133695969f9f664143904823c8f4') +
              blob('2b5b659283e72bdb0b550e084c6be0b365c5ca54')
          )
          print('Attack script and image staged.')
          PY

      - name: Run real ImageNet white-box attack
        run: |
          python /tmp/attack.py | tee /tmp/attack.log

      - name: Upload verified adversarial sample
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: imagenet-adversarial-result
          path: |
            /tmp/adv.png
            /tmp/result.json
            /tmp/attack.log
            /tmp/input.jpg
          if-no-files-found: warn
          retention-days: 7
